<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Tekken 8 Helper</title>
  <link rel="stylesheet" href="styles/home.css" />
  <link rel="icon" type="image/png" href="/img/icons/favicon.png" />

</head>

<body class="combo-page">
  <main class="app-shell combo-shell">
    <section class="hero combo-hero">
      <div class="combo-hero-row">
        <button id="backButton" class="back-button" type="button">Back</button>
        <p class="eyebrow" id="comboEyebrow">Tekken 8 Helper</p>
      </div>
      <div class="combo-hero-main">
        <div class="combo-hero-art" id="comboHeroArt" aria-hidden="true"></div>
        <div class="combo-hero-copy">
          <h1 id="comboTitle">Combo page</h1>
        </div>
      </div>
    </section>

    <section class="panel combo-panel">
      <div id="comboSections" class="combo-sections" aria-live="polite"></div>
    </section>
  </main>

  <script src="scripts/combo.js" defer></script>
</body>

</html>
