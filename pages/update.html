<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Available</title>
    <link rel="stylesheet" href="../styles/update.css">
</head>

<body>
    <div class="container">

        <h1 class="title">Merlin's Tekken 8 Helper</h1>


        <div class="status" id="status">
            New Update Available
        </div>

        <div class="bar-container" id="progress-container" style="display:none;">
            <div class="bar" id="progress"></div>
        </div>

        <div class="buttons">
            <button id="action">
                Download & Install
            </button>

            <button id="decline">
                No Thanks
            </button>
        </div>

    </div>

    <script>
        const {
            closeUpdateWindow,
            startUpdateDownload,
            installUpdate,
            onUpdateVersion,
            onUpdateProgress,
            onUpdateReady,
            onUpdateError,
        } = window.tekkenHelper;

        const button = document.getElementById("action");
        const status = document.getElementById("status");
        const progress = document.getElementById("progress");
        const progressContainer = document.getElementById("progress-container");

        const declineButton = document.getElementById("decline");

        declineButton.onclick = () => {
            closeUpdateWindow();
        };

        onUpdateVersion((ver) => {
            status.textContent = `New Update Available — v${ver}`;
        });

        button.onclick = () => {
            button.disabled = true;
            declineButton.disabled = true;
            status.textContent = "DOWNLOADING UPDATE...";
            startUpdateDownload();
        };

        onUpdateProgress((percent) => {
            progressContainer.style.display = "block";
            progress.style.width = `${percent}%`;
            status.textContent = `DOWNLOADING ${percent}%`;
        });

        onUpdateReady(() => {
            progress.style.width = "100%";
            status.textContent = "UPDATE READY";

            button.disabled = false;
            button.textContent = "RESTART & INSTALL";

            button.onclick = () => {
                installUpdate();
            };
        });

        onUpdateError((message) => {
            status.textContent = message;
            button.disabled = false;
            declineButton.disabled = false;
        });
    </script>

</body>

</html>
