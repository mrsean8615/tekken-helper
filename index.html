<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Tekken 8 Helper</title>
  <link rel="stylesheet" href="styles/home.css" />
  <link rel="icon" type="image/png" href="/img/icons/favicon.png" />
</head>

<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Tekken 8 Helper</p>
      <h1>Pick your fighter</h1>
      <p class="hero-copy">Choose a character to begin.</p>
      <p class="update-status" aria-live="polite">Checking for updates...</p>
      <div class="header-logo">
        <span class="version_number"></span>
        <img src="img/icons/favicon.png" alt="Tekken 8 Helper Logo" class="hero-logo" />
      </div>
    </section>

    <section class="panel">
      <div class="grid" id="characterGrid" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="scripts/home.js" defer></script>
</body>

</html>
