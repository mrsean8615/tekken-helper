name: Build Electron App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Check version change
        id: version_check
        shell: pwsh
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"

          # Default outputs
          "version_changed=false" >> $env:GITHUB_OUTPUT

          $files = git diff --name-only $before $after
          if ($files -notcontains "package.json") {
            Write-Host "package.json not changed."
            exit 0
          }

          $prev = (git show "$before`:package.json" | ConvertFrom-Json).version
          $curr = (Get-Content package.json -Raw | ConvertFrom-Json).version

          if ($prev -eq $curr) {
            Write-Host "package.json changed, but version stayed the same: $curr"
            exit 0
          }

          $tag = "v$curr"
          "version_changed=true" >> $env:GITHUB_OUTPUT
          "new_version=$curr" >> $env:GITHUB_OUTPUT
          "new_tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version changed: $prev -> $curr"

      - name: Install Dependencies
        if: steps.version_check.outputs.version_changed == 'true'
        run: npm ci

      - name: Build Electron App
        if: steps.version_check.outputs.version_changed == 'true'
        run: npm run build

      - name: Create and push tag
        if: steps.version_check.outputs.version_changed == 'true'
        shell: pwsh
        run: |
          $tag = "${{ steps.version_check.outputs.new_tag }}"
          if (git tag -l $tag) {
            Write-Host "Tag $tag already exists. Skipping tag creation."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag

      - name: Create GitHub Release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_check.outputs.new_tag }}
          name: ${{ steps.version_check.outputs.new_tag }}
          files: |
            dist/latest.yml
            dist/Tekken-Helper-Setup-*.exe
            dist/Tekken-Helper-Setup-*.exe.blockmap
