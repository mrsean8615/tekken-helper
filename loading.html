<style>
    body {
        margin: 0;
        height: 100vh;
        background: #05070a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Arial Black", Arial, sans-serif;
    }

    .container {
        text-align: center;
    }

    .spinner {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        border: 6px solid rgba(255, 40, 0, 0.2);
        border-top-color: #ff2a00;
        border-right-color: #ff8c00;
        animation: spin 0.8s linear infinite;
        box-shadow:
            0 0 15px #ff2a00,
            0 0 30px rgba(255, 80, 0, 0.5);
    }

    .title {
        margin-top: 25px;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #ff4500;
        text-shadow:
            0 0 10px #ff2a00,
            0 0 20px #ff8c00;
    }

    .subtitle {
        margin-top: 10px;
        color: #aaa;
        font-size: 14px;
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }
</style>

<div class="container">
    <div class="spinner"></div>
    <div class="title">Tekken 8 Helper</div>
    <div class="subtitle">Loading battle data...</div>
